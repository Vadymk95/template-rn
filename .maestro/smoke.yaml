# Smoke: launch → overview → toggle first todo complete → Active filter hides it.
# Run all flows in folder: maestro test .maestro
# Single file: maestro test .maestro/smoke.yaml
# Requires MAESTRO_APP_ID (bundle id, e.g. com.example.templatern) and Maestro CLI.
# Install: curl -Ls "https://get.maestro.mobile.dev" | bash

appId: ${MAESTRO_APP_ID}
---
- launchApp
- assertVisible: 'Overview'
- assertVisible: 'Review onboarding copy'
- tapOn:
      id: 'todo-toggle-todo-1713596400000'
- tapOn:
      id: 'todo-filter-active'
- assertVisible: 'Book design review'
- assertNotVisible: 'Review onboarding copy'
