name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        name: Typecheck, lint, test
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - name: Install
              run: npm ci

            - name: Typecheck (tsc — blocking)
              run: npm run typecheck

            - name: Oxlint (fast pre-pass — blocking)
              run: npm run lint:oxlint

            - name: ESLint (flat config — blocking)
              run: npm run lint

            - name: Prettier (format:check — blocking, matches IDE + .vscode)
              run: npm run format:check

            - name: Jest (coverage thresholds — blocking)
              run: npm run test:coverage

            - name: Expo doctor (SDK health — blocking)
              run: npm run doctor

    dependency-review:
        name: Dependency review
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        timeout-minutes: 5
        permissions:
            contents: read
            pull-requests: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Review dependency changes for vulnerabilities / license issues
              uses: actions/dependency-review-action@v4
